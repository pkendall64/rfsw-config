<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#1a1d24"/>
  <!-- package body -->
  <rect x="7" y="7" width="18" height="18" rx="1.5" fill="#2d3542" stroke="#4a5568" stroke-width="0.75"/>
  <!-- pin 1 marker -->
  <circle cx="11" cy="11" r="1.25" fill="#63b3ed"/>
  <!-- top pins -->
  <rect x="9" y="4.5" width="2.5" height="2.5" rx="0.35" fill="#a0aec0"/>
  <rect x="14.75" y="4.5" width="2.5" height="2.5" rx="0.35" fill="#a0aec0"/>
  <rect x="20.5" y="4.5" width="2.5" height="2.5" rx="0.35" fill="#a0aec0"/>
  <!-- bottom pins -->
  <rect x="9" y="25" width="2.5" height="2.5" rx="0.35" fill="#a0aec0"/>
  <rect x="14.75" y="25" width="2.5" height="2.5" rx="0.35" fill="#a0aec0"/>
  <rect x="20.5" y="25" width="2.5" height="2.5" rx="0.35" fill="#a0aec0"/>
  <!-- left pins -->
  <rect x="4.5" y="9" width="2.5" height="2.5" rx="0.35" fill="#a0aec0"/>
  <rect x="4.5" y="14.75" width="2.5" height="2.5" rx="0.35" fill="#a0aec0"/>
  <rect x="4.5" y="20.5" width="2.5" height="2.5" rx="0.35" fill="#a0aec0"/>
  <!-- right pins -->
  <rect x="25" y="9" width="2.5" height="2.5" rx="0.35" fill="#a0aec0"/>
  <rect x="25" y="14.75" width="2.5" height="2.5" rx="0.35" fill="#a0aec0"/>
  <rect x="25" y="20.5" width="2.5" height="2.5" rx="0.35" fill="#a0aec0"/>
  <!-- inner pad / die hint -->
  <rect x="12" y="12" width="8" height="8" rx="0.5" fill="#1e2633" stroke="#3d4a5c" stroke-width="0.5"/>
</svg>
